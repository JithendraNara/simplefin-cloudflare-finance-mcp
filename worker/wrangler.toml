name = "simplefin-finance-mcp"
main = "src/index.ts"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]

# Optional custom domain after deploy:
# [[routes]]
# pattern = "finance.example.com"
# custom_domain = true

# Runs at 12:15 UTC daily. Cloudflare cron triggers use UTC.
[triggers]
crons = ["15 12 * * *"]

[vars]
SYNC_DAYS = "90"
INCREMENTAL_OVERLAP_DAYS = "3"
DATA_MAX_STALENESS_HOURS = "36"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
EMBEDDING_MODEL = "@cf/baai/bge-m3"
AI_TEXT_PROVIDER = "workers_ai"
AI_ROUTE_CATEGORIZE_TRANSACTIONS = "workers_ai"
AI_ROUTE_FIND_UNUSUAL_TRANSACTIONS = "minimax_gateway"
AI_ROUTE_GENERATE_WEEKLY_MONEY_BRIEFING = "minimax_gateway"
AI_ROUTE_QUERY_FINANCE = "minimax_gateway"
AI_ROUTE_REVIEW_UNCATEGORIZED_SUGGESTIONS = "minimax_gateway"
AI_ROUTE_RECATEGORIZE_LOW_CONFIDENCE = "minimax_gateway"
AI_ROUTE_GENERATE_CORRECTION_RULE_TEXT = "minimax_gateway"
AI_GATEWAY_ACCOUNT_ID = "00000000000000000000000000000000"
AI_GATEWAY_ID = "default"
AI_GATEWAY_PROVIDER = "custom-minimax"
MINIMAX_MODEL = "MiniMax-M2.7"
MINIMAX_TOTAL_PER_5HOURS = "500"
MINIMAX_LIMIT_GENERATE_WEEKLY_MONEY_BRIEFING = "20"
MINIMAX_LIMIT_FIND_UNUSUAL_TRANSACTIONS = "100"
MINIMAX_LIMIT_QUERY_FINANCE = "200"
MINIMAX_LIMIT_RECATEGORIZE_LOW_CONFIDENCE = "50"
MINIMAX_LIMIT_GENERATE_CORRECTION_RULE_TEXT = "100"
MINIMAX_LIMIT_REVIEW_UNCATEGORIZED_SUGGESTIONS = "100"
ENABLE_MINIMAX_CATEGORIZER_FALLBACK = "false"
GITHUB_ALLOWED_LOGIN = "your-github-login"
PUBLIC_ORIGIN = "https://finance.example.com"
PUBLIC_MCP_URL = "https://finance.example.com/mcp"

# Create the database with:
#   npx wrangler d1 create simplefin-finance
# Then replace database_id below with the returned UUID.
[[d1_databases]]
binding = "DB"
database_name = "simplefin-finance"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

# Stores OAuth dynamic clients, grants, access tokens, and short-lived GitHub callback state.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "00000000000000000000000000000000"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "simplefin-transactions"

[observability]
enabled = false

# Required secrets:
#   npx wrangler secret put SIMPLEFIN_ACCESS_URL --config worker/wrangler.toml
#   npx wrangler secret put MCP_BEARER_TOKEN --config worker/wrangler.toml
#   npx wrangler secret put ADMIN_TOKEN --config worker/wrangler.toml
#   npx wrangler secret put GITHUB_CLIENT_ID --config worker/wrangler.toml
#   npx wrangler secret put GITHUB_CLIENT_SECRET --config worker/wrangler.toml
#   npx wrangler secret put COOKIE_ENCRYPTION_KEY --config worker/wrangler.toml
#   npx wrangler secret put AI_GATEWAY_TOKEN --config worker/wrangler.toml
